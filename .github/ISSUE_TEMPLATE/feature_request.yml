name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Description
        Describe the feature you'd like to see and why it would be useful.

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Who would use this and what problem does it solve?
      placeholder: "As a developer using indic-voice to localize apps, I want ..."
